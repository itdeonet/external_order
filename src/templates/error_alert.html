<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Application Errors</title>
  </head>
  <body
    style="
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
    "
  >
    <!-- Email Container -->
    <div
      style="
        max-width: 700px;
        margin: 0 auto;
        background-color: #ffffff;
        border: 1px solid #ddd;
      "
    >
      <!-- Header -->
      <div
        style="
          background-color: #c41c3b;
          color: #ffffff;
          padding: 20px;
          text-align: center;
        "
      >
        <h1 style="margin: 0; font-size: 24px">⚠️ Application Errors</h1>
        <p style="margin: 8px 0 0 0; font-size: 14px; opacity: 0.95">
          {{ error_count }} error(s) on {{ timestamp }}
        </p>
      </div>

      <!-- Main Content -->
      <div style="padding: 30px">
        <!-- Errors List -->
        {% for error in errors %}
        <div
          style="
            background-color: #f5f5f5;
            border-left: 4px solid #c41c3b;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 3px;
          "
        >
          <strong style="font-size: 14px; display: block; margin-bottom: 10px"
            >Error {{ loop.index }}</strong
          >
          <pre
            style="
              margin: 0;
              font-family: &quot;Courier New&quot;, monospace;
              font-size: 12px;
              white-space: pre-wrap;
              word-wrap: break-word;
              background-color: #ffffff;
              padding: 10px;
              border: 1px solid #ddd;
              border-radius: 3px;
              overflow-x: auto;
            "
          >
{{ error }}</pre
          >
        </div>
        {% endfor %}
      </div>

      <!-- Footer -->
      <div
        style="
          background-color: #f5f5f5;
          padding: 20px;
          text-align: center;
          border-top: 1px solid #ddd;
          font-size: 12px;
          color: #666;
        "
      >
        <p style="margin: 0 0 8px 0">
          <strong>{{ company_name | default('Deonet') }}</strong>
        </p>
        <p style="margin: 0">
          This is an automated message. Please do not reply to this email.
        </p>
      </div>
    </div>
  </body>
</html>
